<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jarvis AI Assistant</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

<header class="header">
<h1>JARVIS</h1>
<p>Your Personal AI Assistant</p>
</header>


<!-- Assistant Animation -->

<div class="assistant-container">

<div class="jarvis-hud">

<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>

<div class="pulse p1"></div>
<div class="pulse p2"></div>
<div class="pulse p3"></div>
<div class="pulse p4"></div>

<div class="ai-core"></div>

</div>

</div>


<!-- Subtitle Output -->

<div class="subtitle-container">

<p id="subtitle">Jarvis ready...</p>

</div>


<!-- Microphone Button -->

<div class="controls">

<button id="micBtn">
<i class="fa-solid fa-microphone"></i>
</button>

</div>


</div>
<script src="js/SpeechRecognition.js"></script>
<script src="js/app.js"></script>
<script src="js/SpeechSynthesis.js"></script>
<script src="js/jarvisBrain.js"></script>
<script src="js/greetingSkill.js"></script>
<script src="js/timeSkill.js"></script>
<script src="js/websiteSkill.js"></script>
<script src="js/memory.js"></script>
<script src="js/aiService.js"></script>
<script src="js/memoryManager.js"></script>
<script src="js/taskManager.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/intentEngine.js"></script>

</body>
</html>
